[package]
name = "maggie-agi"
version = "0.1.0"
description = "Multi-modal Autonomous General Generative Intelligence Engine"
author = "Dopove"

[build]
entry_point = "run_maggie.sh"
mojo_modules = "maggie/"
python_modules = "maggie/"
target_platform = "linux-x64"

# ============= MOJO AGENTS =============
[[agents.mojo]]
name = "reasoning_agent"
path = "maggie/agents/reasoning/reasoning_agent.mojo"
priority = 10
capabilities = ["planning", "reasoning", "decision_making"]

[[agents.mojo]]
name = "coding_agent"
path = "maggie/agents/coding/coding_agent.mojo"
priority = 9
capabilities = ["code_generation", "debugging", "refactoring"]

[[agents.mojo]]
name = "vision_agent"
path = "maggie/agents/multimodal/vision_agent.mojo"
priority = 8
capabilities = ["image_analysis", "visual_reasoning"]

[[agents.mojo]]
name = "tool_agent"
path = "maggie/agents/tool/tool_agent.mojo"
priority = 7
capabilities = ["tool_execution", "api_calls", "automation"]

[[agents.mojo]]
name = "memory_agent"
path = "maggie/memory/memory_agent.mojo"
priority = 10
capabilities = ["memory_management", "context_retrieval"]

# ============= CORE SYSTEMS =============
[[mojo_modules]]
name = "brain_moe"
path = "maggie/core/brain_moe.mojo"
type = "core"
description = "Mixture of Experts brain architecture"

[[mojo_modules]]
name = "orchestrator"
path = "maggie/core/orchestrator.mojo"
type = "core"
description = "Agent orchestration and coordination"

[[mojo_modules]]
name = "task_planner"
path = "maggie/core/task_planner.mojo"
type = "core"
description = "Task planning and execution"

[[mojo_modules]]
name = "execution_engine"
path = "maggie/core/execution_engine.mojo"
type = "core"
description = "Command execution engine"

# ============= MEMORY SYSTEM =============
[[mojo_modules]]
name = "hot_store"
path = "maggie/memory/hot_store.mojo"
type = "memory"
description = "Fast in-memory cache"

[[mojo_modules]]
name = "warm_store"
path = "maggie/memory/warm_store.mojo"
type = "memory"
description = "Session-based storage"

[[mojo_modules]]
name = "cold_store"
path = "maggie/memory/cold_store.mojo"
type = "memory"
description = "Long-term persistent storage"

# ============= LEARNING SYSTEMS =============
[[mojo_modules]]
name = "adaptive_learning"
path = "maggie/learning/adaptive_learning.mojo"
type = "learning"

[[mojo_modules]]
name = "rag_engine"
path = "maggie/learning/rag_engine.mojo"
type = "learning"

[[mojo_modules]]
name = "finetuning"
path = "maggie/learning/finetuning.mojo"
type = "learning"

[[mojo_modules]]
name = "meta_optimizer"
path = "maggie/learning/meta_optimizer.mojo"
type = "learning"

# ============= TOOL SYSTEMS =============
[[mojo_modules]]
name = "tool_executor"
path = "maggie/tools/executor.mojo"
type = "tools"

[[mojo_modules]]
name = "tool_registry"
path = "maggie/tools/registry.mojo"
type = "tools"

[[mojo_modules]]
name = "code_runner"
path = "maggie/tools/code/code_runner.mojo"
type = "tools"

[[mojo_modules]]
name = "file_ops"
path = "maggie/tools/file/file_ops.mojo"
type = "tools"

[[mojo_modules]]
name = "web_scraper"
path = "maggie/tools/web/web_scraper.mojo"
type = "tools"

[[mojo_modules]]
name = "api_client"
path = "maggie/tools/api/api_client.mojo"
type = "tools"

# ============= PYTHON MODULES =============
[python]
version = "3.11"
bundle_mode = "full"
requirements_file = "requirements.txt"

# Python API modules
[[python.modules]]
path = "maggie/api/"
include = ["rest", "websocket", "middleware.py", "models.py"]

# Python CLI
[[python.modules]]
path = "maggie/cli/"
include = ["*.py", "commands/", "voice/"]

# Python bridges
[[python.modules]]
path = "maggie/memory/bridge.py"
type = "bridge"

[[python.modules]]
path = "maggie/learning/bridge.py"
type = "bridge"

[[python.modules]]
path = "maggie/tools/julia_bridge.py"
type = "bridge"
exclude = true  # Skip Julia integration

# Python tools
[[python.modules]]
path = "maggie/tools/"
include = ["*.py"]
exclude = ["julia_bridge.py"]

# Utilities
[[python.modules]]
path = "maggie/utils/"
include = ["*.py"]

# ============= MODELS =============
[[models.local]]
path = "models/gguf/"
pattern = "*.gguf"
bundle = true
optimize = true

[[models.embeddings]]
path = "models/embeddings/"
bundle = true

# ============= DATABASES =============
[[databases.sqlite]]
name = "memory_db"
source = "data/memories/"
bundle_mode = "embedded"
create_if_missing = true

[[databases.sqlite]]
name = "knowledge_db"
source = "data/knowledge/"
bundle_mode = "embedded"

[[databases.json]]
name = "tool_registry"
source = "data/tools/maggie_tools.json"
bundle_mode = "embedded"

# ============= DATA DIRECTORIES =============
[data]
exclude_patterns = [
    "data/logs/*",
    "data/cache/*",
    "data/safety_logs/*",
    "validation_reports/*"
]

# Bundle these directories
[[data.directories]]
path = "data/memories/"
bundle = true

[[data.directories]]
path = "data/knowledge/"
bundle = true

[[data.directories]]
path = "data/consciousness/"
bundle = true

# ============= CONFIGURATION =============
[[config_files]]
path = "maggie.toml"
bundle = true

[[config_files]]
path = "pyproject.toml"
bundle = true

# ============= SCRIPTS =============
[[scripts]]
path = "run_maggie.sh"
type = "entrypoint"
bundle = true

[[scripts]]
path = "test_maggie.sh"
type = "testing"
bundle = true

[[scripts]]
path = "scripts/setup/"
bundle = true

# ============= ORCHESTRATION =============
[orchestration]
pattern = "hierarchical"
brain_system = "brain_moe"
primary_orchestrator = "orchestrator"
task_planner = "task_planner"
execution_engine = "execution_engine"

# Agent priorities
[orchestration.priorities]
reasoning_agent = 10
memory_agent = 10
coding_agent = 9
vision_agent = 8
tool_agent = 7

# ============= RUNTIME =============
[runtime]
shared_model_memory = true
gpu_support = true
max_memory_gb = 32
enable_hot_reload = false

# Memory tiers
[runtime.memory]
hot_store_size_mb = 512
warm_store_size_mb = 2048
cold_store_path = "data/memories/"

# API configuration
[runtime.api]
rest_enabled = true
rest_port = 8000
websocket_enabled = true
websocket_port = 8001

# CLI configuration
[runtime.cli]
voice_enabled = true
interactive = true

# ============= BUILD OPTIONS =============
[build.optimization]
compile_mojo = true
compile_python_tools = true
quantize_models = true
strip_debug = false  # Keep debug for development
compression = "zstd"
compression_level = 5

[build.exclude]
patterns = [
    "*.pyc",
    "__pycache__",
    "*.log",
    ".git/",
    "validation_reports/",
    "tests/",  # Exclude tests from bundle
    "docs/julia*",  # Exclude Julia docs
    "**/*julia*"  # Exclude all Julia-related files
]

# ============= TESTING =============
[testing]
run_tests_before_build = true
test_script = "test_maggie.sh"
min_test_coverage = 80

# ============= DEPLOYMENT =============
[deployment]
docker_support = true
docker_file = "Dockerfile"
docker_compose = "docker-compose.yml"
