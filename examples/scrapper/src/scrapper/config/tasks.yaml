# tasks.yaml

url_discovery:
  description: 'Generate a list of at least 15 URLs related to emerging fashion trends for 2025. The list must include a mix of high-fashion blogs, runway reviews, and street style galleries. Validate each URL to ensure it returns a 200 OK status.'
  agent: discovery_specialist
  expected_output: 'A clean JSON list of validated URLs.'

content_scraping:
  # FIX: A direct, unambiguous command to the agent
  description: >
    Your task is to execute the 'BatchScraping' tool.
    Use the list of validated URLs from the previous task as the input for the 'urls' parameter of the 'BatchScraping' tool.
    Do not perform any other action.
  agent: scraping_specialist
  expected_output: 'The raw output from the "BatchScraping" tool, which will be a JSON object containing the scraped content.'

quality_assessment:
  description: 'Execute the LlamaQualityAssessmentTool on the provided text. Then, execute the FashionMetadataExtractorTool. Return the combined JSON from both tools.'
  agent: quality_assessor
  expected_output: 'A single JSON object containing the combined results from the quality assessment and metadata extraction, including keys like "quality_score", "brands", and "styles".'

content_categorization:
  description: 'Take the quality-assessed and enriched data. For each item, determine the most appropriate sub-folder within the "collected_data" directory and assign its category.'
  agent: content_categorizer
  expected_output: 'The final JSON data structure, with each item including a "category" key pointing to its correct storage path (e.g., "textual/trend_reports").'

dataset_collection:
  description: "Download the 'zalando-research/fashion-mnist' dataset from Kaggle and the 'fashion_mnist' dataset from HuggingFace. Prepare them for training."
  agent: dataset_specialist
  expected_output: "Confirmation that the datasets have been downloaded and are ready in the appropriate directory."
