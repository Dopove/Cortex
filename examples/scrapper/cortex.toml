# ============================================
# CORTEX TURBO MODE STRESS TEST (FIXED)
# ============================================
[package]
name = "cortex-turbo-stress-test"
version = "0.1.0"
description = "Multi-agent fashion scraper with Turbo Mode"
authors = ["Cortex Team <team@cortex.ai>"]

# ============================================
# EXECUTION CONFIGURATION (FIXED!)
# ============================================
[execution]
# Entry point - run from SRC directory
command = "python -m src.scrapper.main"

# Add src to PYTHONPATH so imports work
python_path = "src"

# ============================================
# MODEL CONFIGURATION
# ============================================
[models]
strategy = "api"

[[models.api]]
provider = "ollama"
name = "llama3.1:8b"
env_key = "OLLAMA_BASE_URL"

# ============================================
# RUNTIME CONFIGURATION (REALISTIC VRAM!)
# ============================================
[runtime]
backend = "auto"

[runtime.hardware]
gpu = true
gpu_layers = -1
cpu_threads = 0
memory_limit = "4GB"  # Your GTX 1650 limit

[runtime.cache]
enabled = true
path = "~/.cortex/cache"
persist = true

# ============================================
# TURBO MODE (REALISTIC FOR GTX 1650)
# ============================================
[runtime.turbo]
enabled = true
parallel_agents = 5      # Only 2 agents for 4GB VRAM!
quantization = "INT4"    # Force INT4 for 7B model
kv_cache_size = "2GB"    # 50% of VRAM for KV cache
memory_profiling = true
agent_pooling = true

# ============================================
# BUILD OPTIONS
# ============================================
[build]
optimization = "basic"
include_python_venv = false
include_tests = false
include_docs = false

exclude = [
    "**/__pycache__/**",
    "**/.git/**",
    "**/.venv/**",
    "**/node_modules/**",
    "**/*.pyc",
    "**/.DS_Store"
]

# ============================================
# AGENTS CONFIGURATION
# ============================================
[agents]
[[agents.crew]]
name = "ScraperAgent"
role = "Web Scraping Specialist"
goal = "Scrape fashion data from multiple sources"
backstory = "Expert in web scraping with 5 years experience"
verbose = true
allow_delegation = false
