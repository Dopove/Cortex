name: Global Test Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests
        working-directory: rust
        run: cargo test --target ${{ matrix.target }}
        env:
          PYO3_PYTHON: python

      - name: Install Python Dependencies
        shell: bash
        run: pip install zstandard

      - name: Build Release CLI
        working-directory: rust
        shell: bash
        run: cargo build --release -p cortex-cli --target ${{ matrix.target }}
        env:
          PYO3_PYTHON: python

      - name: Run Python Adversarial Tests
        working-directory: rust
        shell: bash
        run: |
          mkdir -p target/release
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/cortex.exe target/release/cortex.exe
          else
            cp target/${{ matrix.target }}/release/cortex target/release/cortex
          fi
          python tests/adversarial_arena.py

      - name: Run E2E Execution Test
        shell: bash
        run: bash rust/tests/cross_os_e2e.sh
