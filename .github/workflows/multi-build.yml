name: Global Release Automation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v2.5.9)"
        required: true
        default: "v2.5.9"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x64_ubuntu
            binary: cortex
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x64_fedora_arch
            binary: cortex
          - os: macos-14 # Specifically for Apple Silicon (macOS 14+)
            target: aarch64-apple-darwin
            suffix: arm64_macos
            binary: cortex
          - os: macos-14 # Standard stable runner
            target: x86_64-apple-darwin
            suffix: x64_macos
            binary: cortex
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x64_windows
            binary: cortex.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust Core
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PYO3_PYTHON: python

      - name: Package Release Assets
        shell: bash
        working-directory: rust
        run: |
          mkdir -p release_dist
          RELEASE_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # Copy the compiled binary
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release_dist/

          # Include the installation and management scripts from root
          cp ../install.sh release_dist/

          # Create compressed archive with custom naming: cortex_version_suffix
          if [ "${{ runner.os }}" == "Windows" ]; then
            # Windows runner has 7z in path
            7z a ../cortex_${RELEASE_VERSION}_${{ matrix.suffix }}.zip ./release_dist/*
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} ../cortex_${RELEASE_VERSION}_${{ matrix.suffix }}.exe
          else
            tar -czf ../cortex_${RELEASE_VERSION}_${{ matrix.suffix }}.tar.gz -C release_dist .
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} ../cortex_${RELEASE_VERSION}_${{ matrix.suffix }}
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cortex_${{ github.ref_name }}_${{ matrix.suffix }}
          path: cortex_${{ github.ref_name }}_${{ matrix.suffix }}*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Release Notes
        id: extract_notes
        shell: bash
        run: |
          RELEASE_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # Extract section between the first and second H1 headers
          sed -n "/^# Release Notes: Cortex ${RELEASE_VERSION}/,/^# Release Notes:/p" RELEASE_NOTES.md | sed '$d' > release_body.md
          echo "notes_path=release_body.md" >> $GITHUB_OUTPUT

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cortex ${{ github.event.inputs.version || github.ref_name }} Stable Release
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          body_path: release_body.md
          files: release_artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
