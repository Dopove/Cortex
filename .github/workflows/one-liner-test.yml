name: One-Liner Installer Test

on:
  workflow_dispatch:
  push:
    paths:
      - "install.sh"
      - ".github/workflows/one-liner-test.yml"
  pull_request:
    paths:
      - "install.sh"

jobs:
  test-installer:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-12, macos-latest, windows-latest]
        linux_distro: [ubuntu, fedora]
        exclude:
          - os: macos-12
            linux_distro: fedora
          - os: macos-latest
            linux_distro: fedora
          - os: windows-latest
            linux_distro: fedora
          - os: macos-12
            linux_distro: ubuntu
          - os: macos-latest
            linux_distro: ubuntu
          - os: windows-latest
            linux_distro: ubuntu

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust (Fallback Build Test)
        uses: dtolnay/rust-toolchain@stable

      - name: Run Installer
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            powershell -ExecutionPolicy Bypass -File install.ps1
          elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            if [ "${{ matrix.linux_distro }}" == "fedora" ]; then
              echo "Testing on Fedora via Docker..."
              docker run --rm -v $(pwd):/workspace -w /workspace fedora:latest bash -c "dnf install -y grep findutils curl && bash install.sh"
            else
              echo "Testing on Ubuntu directly..."
              bash install.sh
            fi
          else
            # Test local file execution (simulating curl | bash)
            bash install.sh
          fi

      - name: Verify Installation
        shell: bash
        run: |
          # Ensure bin dir is in path for the rest of the job
          export PATH="$HOME/.local/bin:$PATH"

          echo "Checking version..."
          cortex --version

          echo "Checking init..."
          cortex init
